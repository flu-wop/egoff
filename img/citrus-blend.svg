      <stop offset="0%" style="stop-color:#713F12"/>
      <stop offset="100%" style="stop-color:#854D0E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B7791F"/>
      <stop offset="50%" style="stop-color:#F4C430"/>
      <stop offset="100%" style="stop-color:#B7791F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="480" fill="url(#bg)"/>
  <rect width="600" height="480" fill="rgba(0,0,0,0.18)"/>
  <!-- Decorative rings -->
  <circle cx="300" cy="185" r="120" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="300" cy="185" r="95" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Product symbol -->
  <polygon points="300.0,157.5 332.328188876086,140.5040653093779 326.15405419811674,176.50203265468895 352.3081083962334,201.9959346906221 316.16409443804304,207.24796734531105 300.0,240.0 283.835905561957,207.24796734531105 247.69189160376655,201.9959346906221 273.84594580188326,176.50203265468895 267.671811123914,140.5040653093779" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Gold accent line -->
