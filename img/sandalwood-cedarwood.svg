<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44291A"/>
      <stop offset="100%" style="stop-color:#5C2E0E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B7791F"/>
      <stop offset="50%" style="stop-color:#F4C430"/>
      <stop offset="100%" style="stop-color:#B7791F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="480" fill="url(#bg)"/>
  <rect width="600" height="480" fill="rgba(0,0,0,0.18)"/>
  <!-- Decorative rings -->
  <circle cx="300" cy="185" r="120" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="300" cy="185" r="95" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Product symbol -->
  
        <polygon points="300,120 340,165 350,220 300,240 250,220 260,165" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
        <polygon points="300,147 324,175 330,207 300,219 270,207 276,175" fill="rgba(255,255,255,0.10)"/>
        <line x1="300" y1="120" x2="300" y2="240" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <line x1="260" y1="165" x2="340" y2="220" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
        
  <!-- Gold accent line -->
  <rect x="220" y="315" width="160" height="1.5" fill="url(#gold)" opacity="0.7"/>
  <!-- Product name -->
  <text x="300" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="rgba(255,255,255,0.92)" letter-spacing="3" font-weight="600">SANDALWOOD · CEDARWOOD</text>
  <!-- EGOFF brand -->
  <text x="300" y="390" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#F4C430" letter-spacing="6" opacity="0.85">EGOFF ESSENTIALS</text>
  <!-- Tagline -->
  <text x="300" y="418" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="4" font-style="italic">Essentially Rooted</text>
</svg>